      <stop stop-color="#07111F"/>
      <stop offset="0.58" stop-color="#0B1729"/>
      <stop offset="1" stop-color="#0D2038"/>
    </linearGradient>
    <linearGradient id="accent" x1="112" y1="0" x2="878" y2="0" gradientUnits="userSpaceOnUse">
