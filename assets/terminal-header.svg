    <text x="500" y="66" text-anchor="middle" fill="#94A3B8" font-family="Consolas, 'Courier New', monospace" font-size="16">piriya@cloud-lab: ~/profile</text>
  </g>

  <g font-family="Consolas, 'Courier New', monospace" font-size="21">
