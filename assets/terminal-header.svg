<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Piriya Tharatum profile header</title>
  <desc id="desc">A terminal-style introduction for Piriya Tharatum, a cloud solutions trainee and ICT student focused on cloud, cybersecurity, and infrastructure.</desc>
  <defs>
